<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta name="google-adsense-account" content="ca-pub-6779903931615636">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Background Remover</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Cairo",sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top right,#1d4ed8 0%,transparent 30%),
    radial-gradient(circle at bottom left,#0ea5e9 0%,transparent 25%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    overflow-x:hidden;
}

/* Background Glow */

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#38bdf8;
    filter:blur(180px);
    opacity:.12;
    top:-200px;
    right:-100px;
    z-index:-1;
}

body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:#2563eb;
    filter:blur(160px);
    opacity:.12;
    bottom:-150px;
    left:-100px;
    z-index:-1;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
}

/* Card */

.container{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:28px;
    padding:30px;
    text-align:center;
    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.08);
    position:relative;
    overflow:hidden;
}

.container::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:linear-gradient(90deg,#38bdf8,#2563eb,#06b6d4);
}

/* Title */

.logo{
    width:70px;
    height:70px;
    margin:auto;
    margin-bottom:18px;
    border-radius:22px;
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 10px 25px rgba(56,189,248,.35);
}

h1{
    font-size:30px;
    font-weight:800;
    margin-bottom:10px;
}

.desc{
    color:#cbd5e1;
    font-size:15px;
    line-height:1.7;
    margin-bottom:25px;
}

/* Dropzone */

.dropzone{
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
    border:2px dashed rgba(56,189,248,.5);
    background:rgba(255,255,255,.03);
    border-radius:22px;
    padding:40px 20px;
    cursor:pointer;
    transition:.35s ease;
    overflow:hidden;
}

.dropzone:hover{
    transform:translateY(-3px);
    border-color:#38bdf8;
    background:rgba(56,189,248,.08);
    box-shadow:0 0 25px rgba(56,189,248,.15);
}

.dropzone::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.06),
    transparent
    );
    transform:translateX(-100%);
    transition:.7s;
}

.dropzone:hover::before{
    transform:translateX(100%);
}

.drop-icon{
    font-size:48px;
}

.dropzone p{
    font-size:18px;
    font-weight:700;
}

.dropzone span{
    color:#94a3b8;
    font-size:14px;
}

input{
    display:none;
}

/* Button */

button{
    width:100%;
    border:none;
    margin-top:18px;
    padding:16px;
    border-radius:18px;
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 25px rgba(37,99,235,.35);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 35px rgba(37,99,235,.45);
}

button:active{
    transform:scale(.98);
}

/* Preview */

.preview{
    margin-top:25px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.box{
    position:relative;
    border-radius:22px;
    overflow:hidden;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    animation:fade .4s ease;
}

.box img{
    width:100%;
    display:block;
}

.label{
    position:absolute;
    top:12px;
    right:12px;
    background:rgba(15,23,42,.85);
    color:white;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    backdrop-filter:blur(10px);
}

/* Loading */

.loading-overlay{
    position:absolute;
    inset:0;
    background:rgba(2,6,23,.7);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:14px;
}

.loader{
    width:55px;
    height:55px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.15);
    border-top-color:#38bdf8;
    animation:spin .8s linear infinite;
}

.loading-overlay p{
    font-size:14px;
    color:#cbd5e1;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Download */

.download{
    display:none;
    text-decoration:none;
}

/* Footer */

footer{
    margin-top:30px;
    text-align:center;
}

footer p{
    color:#94a3b8;
    font-size:15px;
}

footer span{
    color:#38bdf8;
    font-weight:700;
}

/* Responsive */

@media(max-width:600px){

    .container{
        padding:22px;
    }

    h1{
        font-size:24px;
    }

    .preview{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="wrapper">

<div class="container">

<div class="logo">🪄</div>

<h1>AI Background Remover</h1>

<p class="desc">
احذف خلفية الصور بالذكاء الاصطناعي بسرعة وبدقة عالية
</p>

<label class="dropzone">

<div class="drop-icon">📁</div>

<p>اسحب الصورة أو اضغط للرفع</p>

<span>PNG - JPG - WEBP</span>

<input type="file" id="file" accept="image/*">

</label>

<button onclick="process()">
✨ إزالة الخلفية
</button>

<div class="preview" id="preview"></div>

<a id="download" class="download">
    <button>
        ⬇ تحميل الصورة
    </button>
</a>

</div>

<footer>
    <p>
        Developed By ❤ <span>KHALED WALED</span>
    </p>
</footer>

</div>

<script>

const API_URL = "https://khalidwalidabdelnaseer22-image-remover-bg.hf.space/remove-bg";

let fileData = null;

document.getElementById("file").addEventListener("change",(e)=>{

    fileData = e.target.files[0];

    const preview = document.getElementById("preview");

    preview.innerHTML = `
    
    <div class="box">
    
        <span class="label">الأصلية</span>
    
        <img src="${URL.createObjectURL(fileData)}">
    
    </div>
    
    `;

});

async function process(){

    if(!fileData){
        alert("اختر صورة أولاً");
        return;
    }

    const preview = document.getElementById("preview");

    preview.innerHTML = `
    
    <div class="box">
    
        <span class="label">جاري المعالجة</span>
    
        <img src="${URL.createObjectURL(fileData)}">
    
        <div class="loading-overlay">
        
            <div class="loader"></div>
            
            <p>يتم حذف الخلفية...</p>
        
        </div>
    
    </div>
    
    `;

    const form = new FormData();
    form.append("file", fileData);

    try{

        const res = await fetch(API_URL,{
            method:"POST",
            body:form
        });

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        preview.innerHTML = `
        
        <div class="box">
        
            <span class="label">قبل</span>
        
            <img src="${URL.createObjectURL(fileData)}">
        
        </div>

        <div class="box">
        
            <span class="label">بعد</span>
        
            <img src="${url}">
        
        </div>
        
        `;

        const download = document.getElementById("download");

        download.href = url;
        download.download = "no-bg.png";

        download.style.display = "block";

    }catch(err){

        alert("حدث خطأ أثناء الاتصال بالـ API");

    }

}

</script>

</body>
</html>
